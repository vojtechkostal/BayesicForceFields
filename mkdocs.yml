site_name: Bayesic Force Fields
site_description: Bayesian optimization workflows for fixed-charge molecular force fields
site_url: https://vojtechkostal.github.io/BayesicForceFields/
repo_url: https://github.com/vojtechkostal/BayesicForceFields
repo_name: vojtechkostal/BayesicForceFields
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  logo: assets/bff-logo.svg
  favicon: assets/bff-logo.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - Home: index.md
  - Installation: installation.md
  - Architecture: architecture.md
  - Changelog: changelog.md
  - CLI: cli.md
  - Configuration:
      - Build: configuration/build.md
      - Prepare Assets: configuration/prepare-assets.md
      - Evaluate Snapshots: configuration/evaluate-snapshots.md
      - Sample: configuration/sample.md
      - Analyze: configuration/analyze.md
      - Fit: configuration/fit.md
      - Learn: configuration/learn.md
      - Validate: configuration/validate.md
  - Examples:
      - Overview: examples/index.md
      - Full MD Workflow: examples/acetate.md
      - Existing Tabular Data: examples/arbitrary-data.md
      - Neon RDF Inference: examples/neon-mie-lgpmd.md
  - Development: development.md
