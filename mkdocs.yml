site_name: Bayesic Force Fields
site_description: Bayesian optimization workflows for fixed-charge molecular force fields
site_url: https://vojtechkostal.github.io/BayesicForceFields/
repo_url: https://github.com/vojtechkostal/BayesicForceFields
repo_name: vojtechkostal/BayesicForceFields
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search

nav:
  - Home: index.md
  - Installation: installation.md
  - CLI: cli.md
  - Configuration:
      - Build: configuration/build.md
      - Prepare Assets: configuration/prepare-assets.md
      - Evaluate Snapshots: configuration/evaluate-snapshots.md
      - Sample: configuration/sample.md
      - Analyze: configuration/analyze.md
      - Fit: configuration/fit.md
      - Learn: configuration/learn.md
      - Validate: configuration/validate.md
  - Example:
      - Acetate: examples/acetate.md
  - Development: development.md
